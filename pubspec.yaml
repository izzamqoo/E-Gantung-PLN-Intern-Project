name: egantung_fix
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  qr_code_scanner: ^1.0.0
  http: ^0.13.6
  cupertino_icons: ^1.0.8
  qr_flutter: ^4.0.0
  image_picker: ^1.1.2
  google_mlkit_barcode_scanning: ^0.14.1
  google_mlkit_commons: any
  flutter_launcher_icons: ^0.13.1
  shared_preferences: ^2.2.2 
  # google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/LOGO E-Gantung.png"


dependency_overrides:
  qr_code_scanner:
    git:
      url: https://github.com/juliuscanute/qr_code_scanner.git
      ref: master

flutter:
  uses-material-design: true

  assets:
    - "assets/LOGO E-Gantung.png"
    - "assets/Lgo Transparan.png"

